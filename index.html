<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>(경)데뷔 60주년(축)</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #000;
      font-family: "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
    }

    .intro {
      position: relative;
      width: 100%;
      height: 100vh;
      overflow: hidden;
    }

    .intro img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .intro__overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0, 0, 0, 0.72), rgba(0, 0, 0, 0.12) 45%, rgba(0, 0, 0, 0.28));
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      align-items: center;
      padding: 24px 20px 40px;
    }

    .intro__button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 180px;
      padding: 14px 24px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.5);
      background: rgba(255, 255, 255, 0.14);
      color: #fff;
      text-decoration: none;
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.02em;
      backdrop-filter: blur(8px);
    }

    .intro__button:hover {
      background: rgba(255, 255, 255, 0.22);
    }
  </style>
</head>
<body>
  <section class="intro">
    <img src="image.jpeg" alt="인트로 이미지">
    <div class="intro__overlay">
      <a class="intro__button" href="main.html">초대장 보기</a>
    </div>
  </section>
</body>
</html>
