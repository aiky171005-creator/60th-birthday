<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>(경)데뷔 60주년(축)</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #120f0d;
      font-family: "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
    }

    .intro {
      position: relative;
      width: 100%;
      min-height: 100vh;
      overflow: hidden;
      background: #000;
    }

    .intro img {
      width: 100%;
      height: 100vh;
      object-fit: cover;
      object-position: center;
      display: block;
    }

    .intro__overlay {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(to top, rgba(0, 0, 0, 0.82), rgba(0, 0, 0, 0.16) 42%, rgba(0, 0, 0, 0.22)),
        linear-gradient(to bottom, rgba(0, 0, 0, 0.28), transparent 28%);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: max(24px, env(safe-area-inset-top)) 20px max(32px, env(safe-area-inset-bottom));
    }

    .intro__copy {
      padding-top: 18px;
      text-align: center;
      color: #fff7f0;
    }

    .intro__eyebrow {
      margin: 0 0 10px;
      font-size: 12px;
      letter-spacing: 0.28em;
      font-weight: 700;
      opacity: 0.92;
    }

    .intro__title {
      margin: 0;
      font-size: 30px;
      line-height: 1.35;
      letter-spacing: -0.03em;
      font-weight: 700;
    }

    .intro__footer {
      display: grid;
      gap: 12px;
      justify-items: center;
    }

    .intro__hint {
      margin: 0;
      font-size: 13px;
      line-height: 1.6;
      color: rgba(255, 247, 240, 0.86);
      text-align: center;
    }

    .intro__button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: min(100%, 320px);
      min-height: 56px;
      padding: 16px 24px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.42);
      background: rgba(255, 248, 242, 0.16);
      color: #fff;
      text-decoration: none;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.01em;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    @media (max-width: 480px) {
      .intro__title {
        font-size: 27px;
      }

      .intro__overlay {
        padding-left: 16px;
        padding-right: 16px;
      }
    }
  </style>
</head>
<body>
  <section class="intro">
    <img src="image.jpeg" alt="인트로 이미지">
    <div class="intro__overlay">
      <div class="intro__copy">
        <p class="intro__eyebrow">INVITATION</p>
        <h1 class="intro__title">아빠의 데뷔 60주년<br>축하 식사에 초대합니다!</h1>
      </div>

      <div class="intro__footer">
        <p class="intro__hint">아래 버튼을 눌러 초대장을 확인해주세요.</p>
        <a class="intro__button" href="main.html">초대장 보기</a>
      </div>
    </div>
  </section>
</body>
</html>
