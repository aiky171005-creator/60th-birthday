<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>(경)데뷔 60주년(축)</title>
  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --bg-top: #efe1bc;
      --bg-bottom: #fbf5e9;
      --text-light: #fffdf7;
      --accent: #b58a2b;
      --accent-deep: #6d521b;
      --glass: rgba(255, 249, 238, 0.14);
      --glass-line: rgba(246, 231, 192, 0.34);
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top, rgba(255, 255, 255, 0.2), transparent 28%),
        linear-gradient(180deg, var(--bg-top), var(--bg-bottom));
      font-family: "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
    }

    .intro {
      position: relative;
      width: 100%;
      min-height: 100vh;
      overflow: hidden;
      background: #241a0d;
    }

    .intro img {
      width: 100%;
      height: 100vh;
      object-fit: cover;
      object-position: center;
      display: block;
    }

    .intro__overlay {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(to top, rgba(33, 24, 11, 0.84), rgba(33, 24, 11, 0.18) 40%, rgba(33, 24, 11, 0.28)),
        linear-gradient(to bottom, rgba(95, 74, 28, 0.22), transparent 28%);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: max(24px, env(safe-area-inset-top)) 20px max(32px, env(safe-area-inset-bottom));
    }

    .intro__copy {
      padding-top: 34px;
      text-align: center;
      color: var(--text-light);
    }

    .intro__eyebrow {
      margin: 0 0 14px;
      font-size: 11px;
      letter-spacing: 0.34em;
      font-weight: 700;
      color: rgba(255, 246, 223, 0.94);
    }

    .intro__title {
      margin: 0;
      font-size: 33px;
      line-height: 1.4;
      letter-spacing: -0.035em;
      font-weight: 700;
      text-shadow: 0 10px 24px rgba(0, 0, 0, 0.24);
    }

    .intro__footer {
      display: grid;
      gap: 14px;
      justify-items: center;
      padding: 20px 16px 16px;
      border-top: 1px solid rgba(246, 231, 192, 0.18);
      background: linear-gradient(180deg, rgba(255, 250, 239, 0.02), rgba(255, 250, 239, 0.08));
    }

    .intro__hint {
      margin: 0;
      font-size: 12px;
      line-height: 1.75;
      letter-spacing: 0.03em;
      color: rgba(255, 247, 228, 0.9);
      text-align: center;
    }

    .intro__button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: min(100%, 320px);
      min-height: 56px;
      padding: 16px 24px;
      border-radius: 999px;
      border: 1px solid rgba(233, 213, 164, 0.46);
      background: rgba(255, 250, 239, 0.1);
      color: #fff;
      text-decoration: none;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.08em;
    }

    .intro__button:active {
      transform: scale(0.985);
    }

    @media (max-width: 480px) {
      .intro__title {
        font-size: 29px;
      }

      .intro__overlay {
        padding-left: 16px;
        padding-right: 16px;
      }

      .intro__footer {
        padding-left: 12px;
        padding-right: 12px;
      }
    }
  </style>
</head>
<body>
  <section class="intro">
    <img src="image.jpeg" alt="인트로 이미지">
    <div class="intro__overlay">
      <div class="intro__copy">
        <p class="intro__eyebrow">INVITATION</p>
        <h1 class="intro__title">아빠의 데뷔 60주년<br>축하 식사에 초대합니다!</h1>
      </div>

      <div class="intro__footer">
        <p class="intro__hint">아래 버튼을 눌러 초대장을 확인해주세요.</p>
        <a class="intro__button" href="main.html">초대장 보기</a>
      </div>
    </div>
  </section>
</body>
</html>
