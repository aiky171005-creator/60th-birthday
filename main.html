<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>아빠 환갑 식사 초대장</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #f7f1eb;
      color: #2f2723;
      font-family: "Apple SD Gothic Neo", "Noto Serif KR", serif;
    }

    .invite {
      max-width: 720px;
      margin: 0 auto;
      min-height: 100vh;
      padding: 32px 20px 56px;
    }

    .card {
      background: #fffdf9;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(75, 47, 31, 0.12);
    }

    .card img {
      width: 100%;
      display: block;
      aspect-ratio: 4 / 5;
      object-fit: cover;
    }

    .card__content {
      padding: 32px 24px 36px;
      text-align: center;
      line-height: 1.8;
    }

    .card__eyebrow {
      margin: 0 0 10px;
      font-size: 14px;
      letter-spacing: 0.18em;
      color: #a57c5b;
    }

    .card h1 {
      margin: 0;
      font-size: 32px;
      line-height: 1.35;
    }

    .card__message {
      margin: 20px 0 28px;
      font-size: 16px;
      color: #5f5249;
    }

    .info {
      margin: 0;
      padding: 0;
      list-style: none;
      border-top: 1px solid #eee2d6;
    }

    .info li {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      padding: 16px 0;
      border-bottom: 1px solid #eee2d6;
      font-size: 15px;
    }

    .info strong {
      font-weight: 700;
    }

    .info span {
      text-align: right;
      color: #5f5249;
    }

    @media (max-width: 480px) {
      .card__content {
        padding: 28px 18px 32px;
      }

      .card h1 {
        font-size: 27px;
      }

      .info li {
        flex-direction: column;
        gap: 4px;
      }

      .info span {
        text-align: left;
      }
    }
  </style>
</head>
<body>
  <main class="invite">
    <section class="card">
      <img src="image.jpeg" alt="환갑 식사 초대 이미지">
      <div class="card__content">
        <p class="card__eyebrow">INVITATION</p>
        <h1>아버지의 환갑 식사에<br>초대합니다</h1>
        <p class="card__message">
          소중한 분들과 함께 따뜻한 시간을 보내고 싶습니다.<br>
          편한 마음으로 오셔서 축하해 주세요.
        </p>

        <ul class="info">
          <li>
            <strong>일시</strong>
            <span>2026년 4월 20일 오후 6시</span>
          </li>
          <li>
            <strong>장소</strong>
            <span>OO식당 3층 연회실</span>
          </li>
          <li>
            <strong>주소</strong>
            <span>서울시 OO구 OO로 123</span>
          </li>
          <li>
            <strong>연락처</strong>
            <span>010-0000-0000</span>
          </li>
        </ul>
      </div>
    </section>
  </main>
</body>
</html>
